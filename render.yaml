services:
  # The FastAPI Backend
  - type: web
    name: academic-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT --app-dir backend
    plan: free # Use the free tier
    envVars:
      - key: MONGO_URL
        sync: false # You will paste your MongoDB Atlas URL here in the Render Dashboard
      - key: DB_NAME
        value: academic_crm
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10.0
